<nav class="nav">
  <div class="nav-inner">
    <a routerLink="/" class="brand">
      <span class="brand-name">StudyHub</span>
    </a>
    <div class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link">Browse</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/sessions/new" class="btn-create">+ Create Session</a>
        <div class="user-menu">
          <a routerLink="/profile" class="user-name">{{ auth.currentUser()?.name }}</a>
          <button class="btn-logout" (click)="auth.logout()">Sign out</button>
        </div>
      } @else {
        <a routerLink="/login" class="nav-link">Sign in</a>
        <a routerLink="/register" class="btn-create">Create account</a>
      }
    </div>
  </div>
</nav>
